<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; img-src 'self' data:; frame-src 'none';">
    <title>Stiga Finance — Admin Feedbacks</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-l: #F4E5C3;
            --bg: #0A0E17;
            --card: rgba(18,23,38,0.97);
            --border: rgba(212,175,55,0.18);
            --muted: #8A95A3;
            --green: #2ECC71;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Cormorant Garamond',serif;background:radial-gradient(ellipse at top,#1a1f2e,#0a0e17);min-height:100vh;color:#fff;}

        /* LOGIN ADMIN */
        #adminLogin {
            display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
        }
        .admin-login-card {
            background:var(--card);border:1px solid var(--border);border-radius:18px;
            padding:44px 40px;max-width:380px;width:100%;text-align:center;
            box-shadow:0 30px 80px rgba(0,0,0,0.6);
        }
        .admin-login-card h1{font-family:'Cinzel',serif;font-size:1.2rem;letter-spacing:2px;margin-bottom:6px;
            background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .admin-login-card p{font-size:0.85rem;color:var(--muted);margin-bottom:28px;}

        /* DASHBOARD */
        #adminDash{display:none;}
        .dash-header{
            background:rgba(8,12,22,0.9);backdrop-filter:blur(14px);
            border-bottom:1px solid var(--border);
            padding:16px 32px;display:flex;align-items:center;justify-content:space-between;
            position:sticky;top:0;z-index:100;
        }
        .dash-brand{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:2px;
            background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .dash-sub{font-family:'Cinzel',serif;font-size:0.6rem;color:var(--muted);letter-spacing:1.5px;}

        .dash-main{max-width:1000px;margin:0 auto;padding:40px 24px 80px;}

        /* STATS */
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px;}
        .stat-card{
            background:var(--card);border:1px solid var(--border);border-radius:14px;
            padding:22px 20px;text-align:center;
        }
        .stat-value{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;
            background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            margin-bottom:4px;}
        .stat-label{font-family:'Cinzel',serif;font-size:0.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

        /* FEEDBACKS */
        .section-title{font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}

        .fb-list{display:flex;flex-direction:column;gap:12px;}
        .fb-item{
            background:var(--card);border:1px solid var(--border);border-radius:14px;
            padding:20px 24px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;
        }
        .fb-stars{font-size:1.2rem;color:var(--gold);white-space:nowrap;letter-spacing:2px;}
        .fb-email{font-family:'Cinzel',serif;font-size:0.72rem;color:var(--gold-l);margin-bottom:6px;letter-spacing:0.5px;}
        .fb-comment{font-size:0.92rem;color:var(--muted);line-height:1.5;font-style:italic;}
        .fb-comment.empty{opacity:0.4;}
        .fb-date{font-family:'Cinzel',serif;font-size:0.62rem;color:var(--muted);text-align:right;white-space:nowrap;}

        /* FORM FIELDS */
        .field-group{margin-bottom:14px;text-align:left;}
        .field-label{display:block;font-family:'Cinzel',serif;font-size:0.65rem;color:var(--gold-l);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
        input[type=email],input[type=password]{
            width:100%;padding:12px 14px;background:rgba(0,0,0,0.3);
            border:1px solid var(--border);border-radius:10px;color:#fff;
            font-family:'Cormorant Garamond',serif;font-size:1rem;
        }
        input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.1);}
        .btn-gold{
            display:flex;align-items:center;justify-content:center;gap:8px;
            width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),#B8942A);
            color:#0A0E17;border:none;border-radius:10px;font-family:'Cinzel',serif;
            font-size:0.8rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;
            box-shadow:0 4px 20px rgba(212,175,55,0.25);transition:all 0.3s;margin-top:6px;
        }
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,175,55,0.4);}
        .btn-outline{
            display:flex;align-items:center;gap:6px;
            padding:7px 16px;background:transparent;border:1px solid var(--border);
            border-radius:8px;color:var(--muted);font-family:'Cinzel',serif;
            font-size:0.68rem;letter-spacing:0.5px;cursor:pointer;transition:all 0.3s;
        }
        .btn-outline:hover{border-color:var(--gold);color:var(--gold-l);}
        .btn-danger{border-color:rgba(231,76,60,0.35);color:#E74C3C;}
        .btn-danger:hover{background:rgba(231,76,60,0.1);border-color:#E74C3C;}

        .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:1rem;}
        .empty-state div{font-size:2.5rem;margin-bottom:12px;}

        .loading{text-align:center;padding:40px;color:var(--muted);font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:1px;}

        .error-msg{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:10px 14px;color:#ff6b6b;font-size:0.85rem;margin-bottom:14px;display:none;}

        @media(max-width:600px){
            .stats-grid{grid-template-columns:1fr 1fr;}
            .fb-item{grid-template-columns:1fr;gap:8px;}
            .dash-header{padding:12px 16px;}
        }
    </style>
</head>
<body>

<!-- LOGIN ADMIN -->
<div id="adminLogin">
    <div class="admin-login-card">
        <h1>ADMIN — FEEDBACKS</h1>
        <p>Acesso restrito. Entre com sua conta Stiga.</p>
        <div class="error-msg" id="errMsg"></div>
        <div class="field-group">
            <label class="field-label">Email</label>
            <input type="email" id="aEmail" placeholder="seu@email.com">
        </div>
        <div class="field-group">
            <label class="field-label">Senha</label>
            <input type="password" id="aPassword" placeholder="••••••••">
        </div>
        <button class="btn-gold" id="btnAdminLogin" onclick="adminLogin()">Entrar</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="adminDash">
    <div class="dash-header">
        <div>
            <div class="dash-brand">STIGA FINANCE</div>
            <div class="dash-sub">Painel de Feedbacks</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn-outline" onclick="loadFeedbacks()">↻ Atualizar</button>
            <button class="btn-outline btn-danger" onclick="adminLogout()">Sair</button>
        </div>
    </div>

    <div class="dash-main">
        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-label">Total de avaliações</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statAvg">—</div>
                <div class="stat-label">Média de estrelas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat5">—</div>
                <div class="stat-label">5 estrelas ⭐</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statComments">—</div>
                <div class="stat-label">Com comentário</div>
            </div>
        </div>

        <!-- LISTA -->
        <div class="section-title">Todas as Avaliações</div>
        <div id="fbList" class="fb-list">
            <div class="loading">Carregando avaliações...</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyA3sqLG4T5UkRviauT8A4xo5SN59uWvrAs",
    authDomain: "stiga-finance-72dbf.firebaseapp.com",
    projectId: "stiga-finance-72dbf",
    storageBucket: "stiga-finance-72dbf.firebasestorage.app",
    messagingSenderId: "148799450086",
    appId: "1:148799450086:web:743faed370d44b146ac427"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// Garante persistência de sessão local
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e => {
    console.warn('Persistence warning:', e);
});

const ADMIN_EMAIL = 'stigasistemas@gmail.com';

function showDash() {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminDash').style.display = 'block';
    loadFeedbacks();
}

function showLogin(msg) {
    document.getElementById('adminLogin').style.display = 'flex';
    document.getElementById('adminDash').style.display = 'none';
    if (msg) {
        const err = document.getElementById('errMsg');
        err.textContent = msg;
        err.style.display = 'block';
    }
}

// Verificar se já está logado
auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
        showDash();
    } else if (user && user.email !== ADMIN_EMAIL) {
        // Logado mas não é admin — desloga
        auth.signOut();
        showLogin('🚫 Acesso negado. Conta sem permissão de admin.');
    } else {
        showLogin();
    }
});

async function adminLogin() {
    const email = document.getElementById('aEmail').value.trim();
    const pw    = document.getElementById('aPassword').value;
    const btn   = document.getElementById('btnAdminLogin');
    const err   = document.getElementById('errMsg');

    err.style.display = 'none';

    if (email !== ADMIN_EMAIL) {
        err.textContent = '🚫 Acesso negado. Apenas o administrador pode acessar.';
        err.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
        await auth.signInWithEmailAndPassword(email, pw);
    } catch(e) {
        err.textContent = '❌ Senha incorreta';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
}

function adminLogout() {
    auth.signOut().then(() => {
        document.getElementById('adminLogin').style.display = 'flex';
        document.getElementById('adminDash').style.display = 'none';
    });
}

async function loadFeedbacks() {
    document.getElementById('fbList').innerHTML = '<div class="loading">Carregando avaliações...</div>';

    try {
        const snap = await db.collection('feedbacks').orderBy('createdAt', 'desc').get();
        const docs = [];
        snap.forEach(d => docs.push({ id: d.id, ...d.data() }));

        // Stats
        const total    = docs.length;
        const avg      = total ? (docs.reduce((s,d) => s + (d.stars||0), 0) / total).toFixed(1) : '—';
        const five     = docs.filter(d => d.stars === 5).length;
        const comments = docs.filter(d => d.comment && d.comment.trim()).length;

        document.getElementById('statTotal').textContent    = total || '0';
        document.getElementById('statAvg').textContent      = total ? avg + ' ★' : '—';
        document.getElementById('stat5').textContent        = five;
        document.getElementById('statComments').textContent = comments;

        if (!total) {
            document.getElementById('fbList').innerHTML = '<div class="empty-state"><div>📭</div>Nenhuma avaliação ainda.</div>';
            return;
        }

        // Render
        const listEl = document.getElementById('fbList');
        listEl.innerHTML = '';

        docs.forEach(d => {
            const stars   = '★'.repeat(Math.min(d.stars || 0, 5)) + '☆'.repeat(5 - Math.min(d.stars || 0, 5));
            const isEmpty = !d.comment || !d.comment.trim();
            const date    = d.createdAt ? formatDate(d.createdAt.toDate()) : 'Data desconhecida';

            // 🔒 Cria elementos via DOM — nunca innerHTML com dados do usuário
            const item = document.createElement('div');
            item.className = 'fb-item';

            const starsEl = document.createElement('div');
            starsEl.className = 'fb-stars';
            starsEl.textContent = stars;

            const mid = document.createElement('div');

            const emailEl = document.createElement('div');
            emailEl.className = 'fb-email';
            emailEl.textContent = d.email || 'Anônimo'; // textContent — seguro contra XSS

            const commentEl = document.createElement('div');
            commentEl.className = 'fb-comment' + (isEmpty ? ' empty' : '');
            commentEl.textContent = isEmpty ? 'Sem comentário' : d.comment; // textContent — seguro

            mid.appendChild(emailEl);
            mid.appendChild(commentEl);

            const dateEl = document.createElement('div');
            dateEl.className = 'fb-date';
            dateEl.textContent = date;

            item.appendChild(starsEl);
            item.appendChild(mid);
            item.appendChild(dateEl);
            listEl.appendChild(item);
        });

    } catch(e) {
        console.error(e);
        document.getElementById('fbList').innerHTML = '<div class="empty-state"><div>⚠️</div>Erro ao carregar. Verifique as regras do Firestore.</div>';
    }
}

function formatDate(date) {
    return date.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') adminLogin();
});
</script>
</body>
</html>
